# Dragon release pipeline.
#
# This is required to build the compiler on Linux, macOS (Apple Silicon + Intel) and Windows,
#
# Triggers:
#   * If you push a tag like `v0.0.1`            -> publishes a release for that tag
#   * manual "Run workflow" (workflow_dispatch) with a tag input -> same
#
# Asset naming (consumed verbatim by www.dr):
#   dragon-<ver>-linux-x86_64.{deb,rpm,tar.gz}
#   dragon-<ver>-macos-arm64.{dmg,tar.gz}
#   dragon-<ver>-macos-x86_64.{dmg,tar.gz}
#   dragon-<ver>-windows-x86_64.{msi,zip}
#
# LLVM: the codebase builds against a released LLVM (>= 21). The reusable
# .github/actions/setup-llvm installs it from apt.llvm.org (Linux) or Homebrew
# (macOS); LLVM is statically linked, so the produced .deb/.rpm/.dmg do not
# depend on a system libLLVM. Windows still builds LLVM (the release branch)
# from source and caches it, and stays experimental.
#

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write          # create the release + upload assets

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # One bad platform shouldn't sink the others; partial releases are fine.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13/14 are retired/deprecated on GitHub; macos-15-intel is
          # the only remaining free x64 macOS label.
          - { os: ubuntu-22.04,     target: linux-x86_64,  experimental: false }
          - { os: macos-15,         target: macos-arm64,   experimental: false }
          - { os: macos-15-intel,   target: macos-x86_64,  experimental: false }
          # Windows is parked: the runtime targets MinGW (pthreads/unistd.h,
          # MSVC is not a target) but this job built with MSVC, so it can
          # never link. Re-enable once the job is reworked to MSYS2/MinGW
          # (needs an LLVM-from-source build under MinGW, cached after one run).
          # - { os: windows-2022,   target: windows-x86_64, experimental: true }

    steps:
      - uses: actions/checkout@v4

      # ---- Resolve the version from the tag (strip the leading 'v') ----------
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${REF#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER"   >> "$GITHUB_OUTPUT"
          echo "Building Dragon $VER"

      # ---- Toolchain ---------------------------------------------------------
      - name: Install build + packaging tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # rpm: cpack RPM generator; file/dpkg-dev: deb metadata; zlib/zstd:
          # REQUIRED by Dragon's CMake (find_package/find_library).
          sudo apt-get install -y cmake ninja-build rpm file dpkg-dev zlib1g-dev libzstd-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja zstd

      - name: Install build + packaging tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y
          # WiX toolset 3.x provides the candle/light CPack WIX generator needs.
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      # Put MSVC on PATH so the bash-driven LLVM/Dragon Ninja builds find a compiler.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---- LLVM (pinned trunk snapshot, built once + cached) -----------------
      - name: Setup LLVM
        id: llvm
        uses: ./.github/actions/setup-llvm

      # ---- Configure + build -------------------------------------------------
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRAGON_BUILD_TESTS=OFF \
            -DLLVM_DIR="${{ steps.llvm.outputs.llvm-dir }}"

      - name: Build
        shell: bash
        run: cmake --build build --config Release -j

      # ---- Verify the binaries are self-contained on (macOS) --------------------
      # in v0.0.1 we shipped dyld-broken: the bins tried to load Homebrew's libz3 and
      # libzstd by absolute /opt/homebrew paths that only exist on the build
      # machine, so `dragon --version` aborted on any Mac without those brew
      # packages.
      - name: Verify self-contained binaries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for bin in build/dragon build/dragon-egg; do
            otool -L "$bin"
            if otool -L "$bin" | grep -E '/opt/homebrew|/usr/local/(opt|Cellar|lib)'; then
              echo "$bin links non-system libraries by absolute path" >&2
              exit 1
            fi
          done
          ./build/dragon --version

      # ---- Package -----------------------------------------------------------
      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: |
          cpack -G DEB -B "$PWD/dist"
          cpack -G RPM -B "$PWD/dist"
          cpack -G TGZ -B "$PWD/dist"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: build
        run: |
          # No .dmg: macOS installs go through install.sh (curl), which avoids
          # the Gatekeeper quarantine an unsigned disk image would carry.
          cpack -G TGZ -B "$PWD/dist"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: bash
        run: |
          cpack -G WIX -B "$PWD/dist"
          cpack -G ZIP -B "$PWD/dist"

      # ---- Normalize artifact names to what www.dr links to ------------------
      - name: Rename artifacts
        id: rename
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          T="${{ matrix.target }}"
          mkdir -p out
          shopt -s nullglob
          pick() {  # pick <glob> <dest-extension>
            local g="$1" ext="$2"
            local files=( build/dist/*.$g )
            if [ ${#files[@]} -eq 0 ]; then
              echo "no .$g produced (skipping)"; return 0
            fi
            cp "${files[0]}" "out/dragon-${VER}-${T}.${ext}"
            echo "  -> dragon-${VER}-${T}.${ext}"
          }
          case "$T" in
            linux-*)   pick deb deb;    pick rpm rpm;    pick "tar.gz" "tar.gz" ;;
            macos-*)                                     pick "tar.gz" "tar.gz" ;;
            windows-*) pick msi msi;                     pick zip zip ;;
          esac
          # Checksums alongside each artifact.
          ( cd out && for f in *; do
              if command -v sha256sum >/dev/null; then sha256sum "$f" > "$f.sha256";
              else shasum -a 256 "$f" > "$f.sha256"; fi
            done )
          ls -la out

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Dragon ${{ steps.ver.outputs.version }}
          draft: true                # review before going public
          fail_on_unmatched_files: false
          files: out/*
