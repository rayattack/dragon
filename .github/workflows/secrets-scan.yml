# Server-side secret scan. A key that slips past the local pre-commit hook (or a
# push from a machine that never installed it) is still caught here before merge.
# Free for public repositories - no license needed
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0        # full history so a PR's new commits are all scanned
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
