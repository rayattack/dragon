# Server-side secret scan. A key that slips past the local pre-commit hook (or a
# push from a machine that never installed it) is still caught here before merge.
# Free for public repositories - no license needed
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read     # gitleaks-action enumerates the PR's commits via the API

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0        # full history so a PR's new commits are all scanned
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required since gitleaks-action v2: on a PR it enumerates 
          # the PR's commits. Autoprovisioned per-job token, not stored and dies wth job
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
