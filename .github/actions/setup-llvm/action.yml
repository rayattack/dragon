# Provide the LLVM that Dragon links against.
#
# 
# Dragon builds against a RELEASED LLVM (>= 21; see the floor check in the root
# CMakeLists.txt). On Linux and macOS that is a one-shot package install, so the
# old "build LLVM trunk from source and cache it" dance (45-90 min on a cold
# cache) is gone for those platforms.
#
#   * Linux  -> apt.llvm.org dev package        (llvm-<major>-dev), ~1 min
#   * macOS  -> Homebrew                         (llvm@<major>),     ~1-2 min
#   * Windows-> built from the release/<major>.x branch and cached, because no
#              Windows package ships LLVM *with* the CMake config + static libs
#              Dragon needs to link against. (Still experimental in release.yml.)
#
# The output `llvm-dir` is the directory holding LLVMConfig.cmake; pass it as
# -DLLVM_DIR=. To move onto a newer LLVM, bump `llvm-major` (and confirm the
# CMakeLists floor still holds).
#

name: 'Setup LLVM'
description: 'Install (Linux/macOS) or build+cache (Windows) the released LLVM Dragon links against'

inputs:
  llvm-major:
    description: 'LLVM major version to provide (a released series, >= 21)'
    required: false
    default: '22'
  install-dir:
    description: 'Windows only: directory the built LLVM is installed into (and cached)'
    required: false
    default: ${{ github.workspace }}/.llvm-install

outputs:
  llvm-dir:
    description: 'Path to the LLVMConfig.cmake directory (pass as -DLLVM_DIR=)'
    value: ${{ steps.linux.outputs.llvm-dir || steps.macos.outputs.llvm-dir || steps.windows.outputs.llvm-dir }}

runs:
  using: composite
  steps:
    # ---- Linux: apt.llvm.org -------------------------------------------------
    - name: Install LLVM (Linux)
      id: linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euxo pipefail
        MAJOR="${{ inputs.llvm-major }}"
        CODENAME="$(. /etc/os-release; echo "$VERSION_CODENAME")"
        curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
        echo "deb http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-${MAJOR} main" \
          | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get update
        sudo apt-get install -y "llvm-${MAJOR}-dev"
        echo "llvm-dir=$(llvm-config-${MAJOR} --cmakedir)" >> "$GITHUB_OUTPUT"

    # ---- macOS: Homebrew -----------------------------------------------------
    - name: Install LLVM (macOS)
      id: macos
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euxo pipefail
        MAJOR="${{ inputs.llvm-major }}"
        brew install "llvm@${MAJOR}"
        PREFIX="$(brew --prefix "llvm@${MAJOR}")"
        echo "llvm-dir=${PREFIX}/lib/cmake/llvm" >> "$GITHUB_OUTPUT"

    # ---- Windows: build the release branch from source, cached ---------------
    - name: Restore LLVM from cache (Windows)
      id: cache
      if: runner.os == 'Windows'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ inputs.install-dir }}
        key: llvm-${{ runner.os }}-${{ runner.arch }}-release-${{ inputs.llvm-major }}-v1

    - name: Build LLVM (Windows, cache miss only)
      if: runner.os == 'Windows' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euxo pipefail
        SRC="${RUNNER_TEMP}/llvm-src"
        # Shallow-fetch the tip of the released series (e.g. release/22.x).
        git init -q "$SRC"
        cd "$SRC"
        git remote add origin https://github.com/llvm/llvm-project.git
        git fetch --depth 1 origin "release/${{ inputs.llvm-major }}.x"
        git checkout -q FETCH_HEAD
        cmake -S llvm -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="" \
          -DLLVM_TARGETS_TO_BUILD=Native \
          -DBUILD_SHARED_LIBS=OFF \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_ENABLE_ZLIB=OFF \
          -DLLVM_ENABLE_ZSTD=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_ENABLE_LIBXML2=OFF \
          -DLLVM_ENABLE_LIBEDIT=OFF \
          -DLLVM_ENABLE_ASSERTIONS=OFF \
          -DLLVM_PARALLEL_LINK_JOBS=1 \
          -DCMAKE_INSTALL_PREFIX="${{ inputs.install-dir }}"
        cmake --build build --target install -j

    - name: Export LLVM_DIR (Windows)
      id: windows
      if: runner.os == 'Windows'
      shell: bash
      run: echo "llvm-dir=${{ inputs.install-dir }}/lib/cmake/llvm" >> "$GITHUB_OUTPUT"
